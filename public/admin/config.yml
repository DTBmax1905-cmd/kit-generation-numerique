backend:
  name: git-gateway
  branch: main

locale: fr

media_folder: public/uploads
public_folder: /uploads

collections:

  - name: thematiques
    label: "📁 Thématiques"
    label_singular: Thématique
    folder: content/thematiques
    format: json
    extension: json
    create: true
    slug: "{{id}}"
    identifier_field: titre
    summary: "{{emoji}} {{titre}}"
    fields:
      - name: id
        label: "Identifiant (sans espaces ni accents)"
        widget: string
        hint: "Ex: sport, bien-etre — utilisé dans l'URL, ne pas modifier après création"
      - { name: titre, label: "Titre affiché", widget: string }
      - { name: emoji, label: "Emoji", widget: string, default: "📁" }
      - name: couleur
        label: Couleur
        widget: select
        options:
          - { label: "Vert", value: green }
          - { label: "Bleu", value: blue }
          - { label: "Orange", value: orange }
          - { label: "Violet", value: purple }
          - { label: "Rose", value: pink }
      - { name: ordre, label: "Ordre d'affichage", widget: number, default: 99 }

  - name: sous_thematiques
    label: "📂 Sous-thématiques"
    label_singular: Sous-thématique
    folder: content/sous-thematiques
    format: json
    extension: json
    create: true
    slug: "{{id}}"
    identifier_field: titre
    summary: "{{titre}} ({{thematique_id}})"
    fields:
      - name: id
        label: "Identifiant (sans espaces ni accents)"
        widget: string
        hint: "Ex: yoga, recettes — utilisé dans l'URL"
      - { name: titre, label: "Titre affiché", widget: string }
      - name: thematique_id
        label: "Thématique parente"
        widget: relation
        collection: thematiques
        search_fields: [titre]
        value_field: id
        display_fields: [titre]

  - name: fiches
    label: "📄 Fiches mémo"
    label_singular: Fiche
    folder: content/fiches
    format: json
    extension: json
    create: true
    slug: "{{thematique}}-{{sous_thematique}}-{{slug}}"
    identifier_field: titre
    summary: "{{titre}}"
    fields:
      - { name: titre, label: Titre, widget: string }
      - name: thematique
        label: Thématique
        widget: relation
        collection: thematiques
        search_fields: [titre]
        value_field: id
        display_fields: [titre]
      - name: sous_thematique
        label: Sous-thématique
        widget: relation
        collection: sous_thematiques
        search_fields: [titre]
        value_field: id
        display_fields: ["titre", "thematique_id"]
      - name: type
        label: Type de fichier
        widget: select
        options:
          - { label: "Image (JPG, PNG)", value: image }
          - { label: "PDF", value: pdf }
      - { name: fichier, label: Fichier, widget: file }
      - { name: description, label: Description, widget: text, required: false }
      - { name: date_maj, label: "Date de mise à jour", widget: datetime }

  - name: jeux
    label: "🎮 Jeux en ligne"
    label_singular: Jeu
    folder: content/jeux
    format: json
    extension: json
    create: true
    slug: "{{slug}}"
    identifier_field: titre
    fields:
      - { name: id, label: Identifiant, widget: string }
      - { name: titre, label: Titre, widget: string }
      - name: categorie
        label: Catégorie
        widget: select
        options:
          - { label: Éducatif, value: educatif }
          - { label: Quiz, value: quiz }
          - { label: Logique, value: logique }
          - { label: Créativité, value: creativite }
      - { name: url, label: "URL du jeu", widget: string, hint: "URL complète (https://...)" }
      - { name: description, label: "Description courte", widget: text }
      - { name: emoji, label: Emoji, widget: string, default: "🎮" }
      - name: couleur
        label: Couleur de la carte
        widget: select
        options:
          - { label: Bleu, value: blue }
          - { label: Orange, value: orange }
          - { label: Turquoise, value: teal }
          - { label: Vert, value: green }
