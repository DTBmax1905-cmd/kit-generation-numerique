backend:
  name: git-gateway
  branch: main

locale: fr

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: parametres
    label: "⚙️ Structure du site"
    files:
      - name: structure
        label: "Thématiques & Sous-thématiques"
        file: data/structure.json
        fields:
          - name: thematiques
            label: Thématiques
            label_singular: Thématique
            widget: list
            allow_add: true
            summary: "{{fields.emoji}} {{fields.titre}}"
            fields:
              - name: id
                label: "Identifiant (sans espaces, sans accents)"
                widget: string
                hint: "Ex: sport, bien-etre, culture — utilisé dans l'URL, ne pas modifier après création"
              - { name: titre, label: "Titre affiché", widget: string }
              - { name: emoji, label: "Emoji", widget: string, default: "📁" }
              - name: couleur
                label: Couleur
                widget: select
                options:
                  - { label: "Vert", value: green }
                  - { label: "Bleu", value: blue }
                  - { label: "Orange", value: orange }
                  - { label: "Violet", value: purple }
                  - { label: "Rose", value: pink }
              - name: sous_thematiques
                label: Sous-thématiques
                label_singular: Sous-thématique
                widget: list
                allow_add: true
                summary: "{{fields.titre}}"
                fields:
                  - name: id
                    label: "Identifiant (sans espaces, sans accents)"
                    widget: string
                    hint: "Ex: yoga, recettes, chateaux — utilisé dans l'URL"
                  - { name: titre, label: "Titre affiché", widget: string }

  - name: fiches
    label: "📄 Fiches mémo"
    label_singular: Fiche
    folder: content/fiches
    format: json
    extension: json
    create: true
    slug: "{{thematique}}-{{sous_thematique}}-{{slug}}"
    identifier_field: titre
    summary: "{{thematique}} › {{sous_thematique}} — {{titre}}"
    fields:
      - { name: titre, label: Titre, widget: string }
      - name: thematique
        label: Thématique (ID)
        widget: string
        hint: "Copier l'identifiant exact depuis ⚙️ Structure du site (ex: sportives, manuelles)"
      - name: sous_thematique
        label: Sous-thématique (ID)
        widget: string
        hint: "Copier l'identifiant exact depuis ⚙️ Structure du site (ex: yoga, bricolage)"
      - name: type
        label: Type de fichier
        widget: select
        options:
          - { label: "Image (JPG, PNG)", value: image }
          - { label: "PDF", value: pdf }
      - { name: fichier, label: Fichier, widget: file }
      - { name: description, label: Description, widget: text, required: false }
      - { name: date_maj, label: "Date de mise à jour", widget: datetime }

  - name: jeux
    label: "🎮 Jeux en ligne"
    label_singular: Jeu
    folder: content/jeux
    format: json
    extension: json
    create: true
    slug: "{{slug}}"
    identifier_field: titre
    fields:
      - { name: id, label: Identifiant, widget: string }
      - { name: titre, label: Titre, widget: string }
      - name: categorie
        label: Catégorie
        widget: select
        options:
          - { label: Éducatif, value: educatif }
          - { label: Quiz, value: quiz }
          - { label: Logique, value: logique }
          - { label: Créativité, value: creativite }
      - { name: url, label: "URL du jeu", widget: string, hint: "URL complète (https://...)" }
      - { name: description, label: "Description courte", widget: text }
      - { name: emoji, label: Emoji, widget: string, default: "🎮" }
      - name: couleur
        label: Couleur de la carte
        widget: select
        options:
          - { label: Bleu, value: blue }
          - { label: Orange, value: orange }
          - { label: Turquoise, value: teal }
          - { label: Vert, value: green }
